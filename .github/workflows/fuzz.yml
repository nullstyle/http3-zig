name: fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Per-push fuzz gates — all cheap, deterministic corpus replays that confirm
# the harnesses compile and the seeded corpora don't crash any decoder:
#
#   * smoke   — ~12 inputs across all codec targets.
#   * corpus  — every file under fuzz/corpus/<target>/ (~100 seeds).
#   * wt      — the WebTransport interleaved-operations corpus (50 seeds),
#               driving a real H3Pair through random WT op sequences.
#
# Coverage-guided exploration (`zig build test --fuzz`) is the heavier
# companion in fuzz-nightly.yml.
jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v4

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Build the fuzz harness
        run: zig build fuzz-codecs

      - name: Run the codec smoke corpus
        run: zig build run-fuzz-smoke

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-smoke-${{ matrix.os }}
          path: |
            fuzz/corpus/
            zig-out/
            .zig-cache/fuzz/
          if-no-files-found: ignore
          retention-days: 14

  corpus:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v4

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Build the corpus runner
        run: zig build fuzz-corpus

      - name: Run every file in fuzz/corpus/
        run: zig build run-fuzz-corpus

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-corpus-${{ matrix.os }}
          path: |
            fuzz/corpus/
            zig-out/
            .zig-cache/fuzz/
          if-no-files-found: ignore
          retention-days: 14

  wt-interleaved:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v4

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Build the WebTransport interleaved fuzz harness
        run: zig build fuzz-wt-interleaved

      - name: Run the WebTransport interleaved corpus
        run: zig build run-fuzz-wt-interleaved

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-wt-interleaved-${{ matrix.os }}
          path: |
            fuzz/corpus/
            zig-out/
            .zig-cache/fuzz/
          if-no-files-found: ignore
          retention-days: 14
