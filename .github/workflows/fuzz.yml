name: fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Per-push fuzz gates — all cheap, deterministic corpus replays that confirm
# the harnesses compile and the seeded corpora don't crash any decoder:
#
#   * smoke   — ~12 inputs across all codec targets.
#   * corpus  — every file under fuzz/corpus/<target>/ (~100 seeds).
#   * wt      — the WebTransport interleaved-operations corpus (50 seeds),
#               driving a real H3Pair through random WT op sequences.
#
# Coverage-guided exploration (`zig build test --fuzz`) is the heavier
# companion in fuzz-nightly.yml.
jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v7

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: zig-pkg
          key: zig-pkg-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkg-

      # GitHub's tarball/raw endpoints flake (504s, DNS) often enough to fail
      # real runs. Prefetch the full dependency tree with retries so a bad
      # window costs seconds, not a red CI run; the cache above makes even
      # that rare.
      - name: Prefetch Zig dependencies (retry on network flake)
        run: |
          for i in 1 2 3 4 5; do
            if zig build --fetch; then exit 0; fi
            echo "fetch attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::dependency prefetch failed after 5 attempts"
          exit 1

      - name: Build the fuzz harness
        run: zig build fuzz-codecs

      - name: Run the codec smoke corpus
        run: zig build run-fuzz-smoke

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes-smoke-${{ matrix.os }}
          path: |
            fuzz/corpus/
            zig-out/
            .zig-cache/fuzz/
          if-no-files-found: ignore
          retention-days: 14

  corpus:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v7

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: zig-pkg
          key: zig-pkg-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkg-

      # GitHub's tarball/raw endpoints flake (504s, DNS) often enough to fail
      # real runs. Prefetch the full dependency tree with retries so a bad
      # window costs seconds, not a red CI run; the cache above makes even
      # that rare.
      - name: Prefetch Zig dependencies (retry on network flake)
        run: |
          for i in 1 2 3 4 5; do
            if zig build --fetch; then exit 0; fi
            echo "fetch attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::dependency prefetch failed after 5 attempts"
          exit 1

      - name: Build the corpus runner
        run: zig build fuzz-corpus

      - name: Run every file in fuzz/corpus/
        run: zig build run-fuzz-corpus

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes-corpus-${{ matrix.os }}
          path: |
            fuzz/corpus/
            zig-out/
            .zig-cache/fuzz/
          if-no-files-found: ignore
          retention-days: 14

  wt-interleaved:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v7

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: zig-pkg
          key: zig-pkg-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkg-

      # GitHub's tarball/raw endpoints flake (504s, DNS) often enough to fail
      # real runs. Prefetch the full dependency tree with retries so a bad
      # window costs seconds, not a red CI run; the cache above makes even
      # that rare.
      - name: Prefetch Zig dependencies (retry on network flake)
        run: |
          for i in 1 2 3 4 5; do
            if zig build --fetch; then exit 0; fi
            echo "fetch attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::dependency prefetch failed after 5 attempts"
          exit 1

      - name: Build the WebTransport interleaved fuzz harness
        run: zig build fuzz-wt-interleaved

      - name: Run the WebTransport interleaved corpus
        run: zig build run-fuzz-wt-interleaved

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes-wt-interleaved-${{ matrix.os }}
          path: |
            fuzz/corpus/
