name: fuzz-nightly

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch: {}

# Long-form companion to the per-push `fuzz.yml`.
#
#   * corpus-loop     — keeps the deterministic corpus replays hot for 30
#                       minutes by looping the codec + WebTransport corpus
#                       runners. Neither accepts a duration flag, so we wrap
#                       with `timeout 30m` and accept exit 124 (SIGTERM) as
#                       successful budget exhaustion; anything else is a real
#                       crash and fails the job.
#   * coverage-guided — the actual coverage-guided fuzzer over the codec
#                       decode surface (`zig build test --fuzz`), which
#                       explores NEW inputs with coverage feedback rather than
#                       replaying a fixed corpus. Linux only: the
#                       std.testing.fuzz runtime aborts on macOS (the platform
#                       gap quic-zig also documents). This is where sanitizer-
#                       grade coverage of the untrusted H3/QPACK/capsule decode
#                       path comes from; ASan over the BoringSSL C++ boundary
#                       is boringssl-zig's concern (BoringSSL is fuzzed
#                       upstream).
jobs:
  corpus-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v7

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: zig-pkg
          key: zig-pkg-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkg-

      # GitHub's tarball/raw endpoints flake (504s, DNS) often enough to fail
      # real runs. Prefetch the full dependency tree with retries so a bad
      # window costs seconds, not a red CI run; the cache above makes even
      # that rare.
      - name: Prefetch Zig dependencies (retry on network flake)
        run: |
          for i in 1 2 3 4 5; do
            if zig build --fetch; then exit 0; fi
            echo "fetch attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::dependency prefetch failed after 5 attempts"
          exit 1

      - name: Build the fuzz harnesses
        run: |
          zig build fuzz-codecs
          zig build fuzz-corpus
          zig build fuzz-wt-interleaved

      - name: Loop codec + WebTransport corpus replays for 30 minutes
        run: |
          timeout 30m bash -c '
            zig build run-fuzz-smoke
            while true; do
              zig build run-fuzz-corpus
              zig build run-fuzz-wt-interleaved
            done
          ' || [ $? -eq 124 ]

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-nightly-corpus-crashes
          path: |
            zig-out/
            fuzz/corpus/
            **/*.crash
          if-no-files-found: ignore
          retention-days: 14

  coverage-guided:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v7

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: zig-pkg
          key: zig-pkg-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkg-

      # GitHub's tarball/raw endpoints flake (504s, DNS) often enough to fail
      # real runs. Prefetch the full dependency tree with retries so a bad
      # window costs seconds, not a red CI run; the cache above makes even
      # that rare.
      - name: Prefetch Zig dependencies (retry on network flake)
        run: |
          for i in 1 2 3 4 5; do
            if zig build --fetch; then exit 0; fi
            echo "fetch attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::dependency prefetch failed after 5 attempts"
          exit 1

      # `zig build test --fuzz` drives every std.testing.fuzz site (the codec
      # harness in tests/integration/codecs.zig) with coverage feedback. It
      # runs until interrupted, so time-box it; exit 124 (SIGTERM from
      # `timeout`) is successful budget exhaustion, anything else is a crash.
      - name: Coverage-guided fuzz for 30 minutes
        run: |
          timeout 30m zig build test --fuzz || [ $? -eq 124 ]

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-nightly-coverage-guided-crashes
          path: |
            zig-out/
            fuzz/corpus/
            .zig-cache/v/
          if-no-files-found: ignore
          retention-days: 14
