name: h3-interop

on:
  schedule:
    # Sunday 07:30 UTC, after the WT matrix cadence but before nightly fuzz.
    - cron: "30 7 * * 0"
  workflow_dispatch:
    inputs:
      timeout_ms:
        description: "Per-peer wallclock timeout (ms)"
        required: false
        default: "30000"

# Advisory third-party HTTP/3 interop. The hard per-push real-socket gate is
# h3-interop-self-test.yml, which keeps the peer in-tree. This workflow adds
# foreign servers (pinned quic-go/http3 and aioquic) without making release
# train health depend on third-party setup flake.
jobs:
  quic-go:
    name: H3 interop (http3-zig client vs quic-go server)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      TIMEOUT_MS: ${{ github.event.inputs.timeout_ms || '30000' }}
      KEEP_WORK_DIR: "1"
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v7

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: zig-pkg
          key: zig-pkg-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkg-

      # GitHub's tarball/raw endpoints flake (504s, DNS) often enough to fail
      # real runs. Prefetch the full dependency tree with retries so a bad
      # window costs seconds, not a red CI run; the cache above makes even
      # that rare.
      - name: Prefetch Zig dependencies (retry on network flake)
        run: |
          for i in 1 2 3 4 5; do
            if zig build --fetch; then exit 0; fi
            echo "fetch attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::dependency prefetch failed after 5 attempts"
          exit 1

      - name: Set up Go (for the quic-go peer)
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: interop/external_h3/server_quic_go/go.sum

      - name: Build the http3-zig external H3 client
        run: zig build external-h3-client

      - name: Build the quic-go H3 peer
        working-directory: interop/external_h3/server_quic_go
        run: |
          set -euo pipefail
          go mod download
          go build -o "${{ runner.temp }}/h3-quic-go-server" .

      - name: Run the advisory H3 matrix
        env:
          CLIENT_TIMEOUT_MS: ${{ env.TIMEOUT_MS }}
          WORK_DIR: ${{ runner.temp }}/external-h3
          QUIC_GO_READY_PATTERN: "^READY "
          QUIC_GO_H3_SERVER_CMD: ${{ runner.temp }}/h3-quic-go-server --listen "$H3_ADDR" --cert "$H3_CERT" --key "$H3_KEY" --root "$H3_ROOT" --max-requests 1 --max-lifetime-ms 60000
        run: bash interop/external_h3/run_matrix.sh quic-go

      - name: Upload H3 interop logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: h3-interop-quic-go-${{ github.run_id }}
          path: ${{ runner.temp }}/external-h3
          if-no-files-found: ignore
          retention-days: 14

  aioquic:
    name: H3 interop (http3-zig client vs aioquic server)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      TIMEOUT_MS: ${{ github.event.inputs.timeout_ms || '30000' }}
      KEEP_WORK_DIR: "1"
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v7

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: zig-pkg
          key: zig-pkg-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkg-

      # GitHub's tarball/raw endpoints flake (504s, DNS) often enough to fail
      # real runs. Prefetch the full dependency tree with retries so a bad
      # window costs seconds, not a red CI run; the cache above makes even
      # that rare.
      - name: Prefetch Zig dependencies (retry on network flake)
        run: |
          for i in 1 2 3 4 5; do
            if zig build --fetch; then exit 0; fi
            echo "fetch attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::dependency prefetch failed after 5 attempts"
          exit 1

      - name: Set up Python (for the aioquic peer)
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: interop/external_h3/server_aioquic/requirements.txt

      - name: Install aioquic H3 peer
        run: python -m pip install -r interop/external_h3/server_aioquic/requirements.txt

      - name: Build the http3-zig external H3 client
        run: zig build external-h3-client

      - name: Run the advisory H3 matrix
        env:
          CLIENT_TIMEOUT_MS: ${{ env.TIMEOUT_MS }}
          WORK_DIR: ${{ runner.temp }}/external-h3
          AIOQUIC_READY_PATTERN: "^READY "
          AIOQUIC_H3_SERVER_CMD: python interop/external_h3/server_aioquic/main.py --host "$H3_HOST" --port "$H3_PORT" --cert "$H3_CERT" --key "$H3_KEY" --root "$H3_ROOT" --max-requests 1 --max-lifetime-ms 60000
        run: bash interop/external_h3/run_matrix.sh aioquic

      - name: Upload H3 interop logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: h3-interop-aioquic-${{ github.run_id }}
          path: ${{ runner.temp }}/external-h3
          if-no-files-found: ignore
          retention-days: 14
