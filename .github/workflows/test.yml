name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# http3-zig tracks Zig master via mise (mise.toml), matching quic-zig — the
# transport dependency it builds against. CI uses jdx/mise-action to install
# the same toolchain as local development.
#
# NOTE: build.zig.zon currently uses a local path dependency for quic_zig
# (../quic-zig) to iterate on both repos at once; CI requires it repointed to
# the published v0.4.0 tarball (`zig fetch --save=quic_zig
# https://github.com/nullstyle/quic-zig/archive/refs/tags/v0.4.0.tar.gz`) so a
# standalone checkout resolves it. boringssl-zig is a URL+hash dep Zig fetches.
jobs:
  build-test:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        optimize: [Debug, ReleaseSafe]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v4

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Print toolchain
        run: |
          zig version
          uname -a

      - name: zig build
        run: zig build -Doptimize=${{ matrix.optimize }} --summary all

      - name: zig build test
        run: zig build test -Doptimize=${{ matrix.optimize }} --summary all

      - name: zig build conformance
        run: zig build conformance -Doptimize=${{ matrix.optimize }} --summary all

  # Long-running-session memory regression gate. `zig build mem-profile` runs
  # the WebTransport long-lived-session profiler (always ReleaseSafe) and exits
  # non-zero if per-iteration retained-memory growth exceeds the gate in
  # bench/wt_memory.zig (see docs/memory-profile.md). Own job — the ReleaseSafe
  # boringssl build is heavy — on one runner rather than the full matrix.
  mem-profile:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v4

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: zig build mem-profile (memory regression gate)
        run: zig build mem-profile
