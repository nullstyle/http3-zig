name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# http3-zig tracks Zig master via mise (mise.toml), matching quic-zig — the
# transport dependency it builds against. CI uses jdx/mise-action to install
# the same toolchain as local development.
#
# build.zig.zon pins quic_zig and boringssl_zig as URL+hash release-tarball
# deps, so a standalone CI checkout fetches everything itself — no local path
# checkout needed. To bump quic-zig, edit build.zig.zon's `.url` + `.hash` by
# hand (run `zig fetch <new-tarball-url>` for the hash — do NOT
# `zig fetch --save`, which mangles the dependency entry).
jobs:
  build-test:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            optimize: Debug
            advisory: false
          - os: ubuntu-latest
            optimize: ReleaseSafe
            advisory: false
          - os: ubuntu-24.04-arm
            optimize: Debug
            advisory: false
          - os: ubuntu-24.04-arm
            optimize: ReleaseSafe
            advisory: false
          - os: macos-15
            optimize: Debug
            advisory: false
          - os: macos-15
            optimize: ReleaseSafe
            advisory: false
          # Preview the next macOS generation without making it a release gate.
          - os: macos-26
            optimize: Debug
            advisory: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.advisory }}
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v7

      - name: Check boringssl-zig pin matches quic-zig
        run: tools/check-boringssl-pin.sh

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      # Tracked files only: the zig-pkg package store (restored below) holds
      # dependency sources that drift under new zig fmt and must not gate us.
      - name: zig fmt check
        run: git ls-files -z '*.zig' '*.zon' | xargs -0 zig fmt --check

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: zig-pkg
          key: zig-pkg-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkg-

      # GitHub's tarball/raw endpoints flake (504s, DNS) often enough to fail
      # real runs. Prefetch the full dependency tree with retries so a bad
      # window costs seconds, not a red CI run; the cache above makes even
      # that rare.
      - name: Prefetch Zig dependencies (retry on network flake)
        run: |
          for i in 1 2 3 4 5; do
            if zig build --fetch; then exit 0; fi
            echo "fetch attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::dependency prefetch failed after 5 attempts"
          exit 1

      - name: Print toolchain
        run: |
          zig version
          uname -a

      - name: zig build
        run: zig build -Doptimize=${{ matrix.optimize }} --summary all

      - name: zig build check-api
        run: zig build check-api -Doptimize=${{ matrix.optimize }} --summary all

      - name: zig build test
        run: zig build test -Doptimize=${{ matrix.optimize }} --summary all

      - name: zig build conformance
        run: zig build conformance -Doptimize=${{ matrix.optimize }} --summary all

      - name: zig build run-examples
        if: matrix.os == 'ubuntu-latest' && matrix.optimize == 'Debug'
        run: zig build run-examples --summary all

      # Real-socket proof for the production server skeleton: udp_server
      # loop on a background thread, udp_client GET / against it over
      # loopback UDP, non-zero exit unless a 200 + expected body came back.
      - name: zig build run-udp-smoke
        if: matrix.os == 'ubuntu-latest' && matrix.optimize == 'Debug'
        run: zig build run-udp-smoke --summary all

      # Consume http3-zig from an out-of-tree project and prove the exported
      # quic_zig/boringssl module instances type-unify with the public API
      # (tools/consumer-smoke/src/main.zig). Module identity is
      # platform-independent — one runner is enough.
      - name: Consumer package smoke (module identity)
        if: matrix.os == 'ubuntu-latest' && matrix.optimize == 'Debug'
        run: |
          cd tools/consumer-smoke
          zig build --summary all
          zig build run

  # Long-running-session memory regression gate. `zig build mem-profile` runs
  # the WebTransport long-lived-session profiler (always ReleaseSafe) and exits
  # non-zero if per-iteration retained-memory growth exceeds the gate in
  # bench/wt_memory.zig (see docs/memory-profile.md). Own job — the ReleaseSafe
  # boringssl build is heavy — on one runner rather than the full matrix.
  mem-profile:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Checkout http3-zig
        uses: actions/checkout@v7

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: zig-pkg
          key: zig-pkg-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkg-

      # GitHub's tarball/raw endpoints flake (504s, DNS) often enough to fail
      # real runs. Prefetch the full dependency tree with retries so a bad
      # window costs seconds, not a red CI run; the cache above makes even
      # that rare.
      - name: Prefetch Zig dependencies (retry on network flake)
        run: |
          for i in 1 2 3 4 5; do
            if zig build --fetch; then exit 0; fi
            echo "fetch attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::dependency prefetch failed after 5 attempts"
          exit 1

      - name: zig build mem-profile (memory regression gate)
        run: zig build mem-profile
